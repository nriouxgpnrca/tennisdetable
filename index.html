<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculateur de pointage, tennis de table</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #d6dbe5;
      --header: #eef2f7;
      --input: #fff7b2;
      --accent: #1f4e79;
      --accent-soft: #eaf2fb;
      --ok: #1d6f42;
      --bad: #9f1239;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Calibri, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #eef3f9 100%);
      color: var(--ink);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 18px 40px;
    }

    .titlebar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 2rem;
      color: var(--accent);
    }

    .subtitle {
      color: var(--muted);
      line-height: 1.4;
      max-width: 780px;
    }

    .card {
      background: var(--card);
      border: 1px solid #e5eaf1;
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(28, 49, 76, 0.08);
      overflow: hidden;
    }

    .card-head {
      padding: 16px 20px;
      background: var(--accent-soft);
      border-bottom: 1px solid #d8e6f4;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .grid-top {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 14px;
      padding: 18px 20px 8px;
    }

    .field label {
      display: block;
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #203046;
    }

    .field input, .field select {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #b8c6d8;
      background: var(--input);
      font-size: 1rem;
      outline: none;
    }

    .field input:focus, .field select:focus {
      border-color: #4f88c6;
      box-shadow: 0 0 0 3px rgba(79, 136, 198, 0.14);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid #b6c8db;
      background: #fff;
      color: #18324d;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.97rem;
      font-weight: 600;
    }

    button:hover {
      background: #f8fbff;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(170px, 1fr));
      gap: 14px;
      padding: 14px 20px 18px;
    }

    .kpi {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      background: #fbfdff;
    }

    .kpi .label {
      font-size: 0.92rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .kpi .value {
      font-size: 1.7rem;
      font-weight: 700;
      color: #11263d;
    }

    .table-wrap {
      padding: 0 20px 22px;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }

    th, td {
      border: 1px solid var(--line);
      padding: 10px 12px;
      vertical-align: middle;
    }

    th {
      background: var(--header);
      color: #22364f;
      text-align: left;
      font-weight: 700;
    }

    th.center, td.center { text-align: center; }
    th.right, td.right { text-align: right; }

    td input, td select {
      width: 100%;
      border: 1px solid #c5cfdb;
      border-radius: 8px;
      padding: 8px 9px;
      font-size: 0.98rem;
      background: var(--input);
    }

    td.points-cell {
      font-weight: 700;
      text-align: center;
      background: #fcfdff;
      min-width: 90px;
    }

    td.points-cell.positive { color: var(--ok); }
    td.points-cell.negative { color: var(--bad); }

    tr.total-row td {
      font-weight: 700;
      background: #f7fafc;
    }

    .note {
      padding: 0 20px 22px;
      color: var(--muted);
      line-height: 1.45;
    }

    .formula-box {
      margin-top: 16px;
      padding: 14px 16px;
      border: 1px solid #dce4ef;
      background: #fafcff;
      border-radius: 12px;
      font-size: 0.95rem;
    }

    code {
      background: #f0f5fb;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.95em;
    }

    @media (max-width: 900px) {
      .grid-top, .summary { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .grid-top, .summary { grid-template-columns: 1fr; }
      h1 { font-size: 1.65rem; }
      .wrap { padding: 18px 10px 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      <div>
        <h1>Calculateur de pointage, tennis de table</h1>
        <div class="subtitle">
          Créé par Nelson Rioux
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div><strong>Pour tournoi 2*</strong>, comme dans la feuille d’origine.</div>
        <div class="controls">
          <button id="btnExample" class="primary">Charger l’exemple</button>
          <button id="btnClear">Effacer les données</button>
        </div>
      </div>

      <div class="grid-top">
        <div class="field">
          <label for="competition">Compétition</label>
          <input id="competition" type="text" value="" placeholder="Nom de la compétition" />
        </div>
        <div class="field">
          <label for="matchDate">Date</label>
          <input id="matchDate" type="date" />
        </div>
        <div class="field">
          <label for="playerName">Joueur</label>
          <input id="playerName" type="text" value="William" />
        </div>
        <div class="field">
          <label for="playerRating">Cote du joueur</label>
          <input id="playerRating" type="number" step="1" value="664" />
        </div>
      </div>

      <div class="summary">
        <div class="kpi">
          <div class="label">Variation de points</div>
          <div class="value" id="totalPoints">0</div>
        </div>
        <div class="kpi">
          <div class="label">Nouvelle cote</div>
          <div class="value" id="newRating">664</div>
        </div>
        <div class="kpi">
          <div class="label">Matchs saisis</div>
          <div class="value" id="matchCount">0</div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:80px" class="center">#</th>
              <th>Nom</th>
              <th style="width:130px" class="center">Cote</th>
              <th style="width:120px" class="center">V/D</th>
              <th style="width:120px" class="center">Points</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
          <tfoot>
            <tr class="total-row">
              <td colspan="4" class="right">Variation de points</td>
              <td id="footerTotal" class="center">0</td>
            </tr>
          </tfoot>
        </table>
      </div>


    </div>
  </div>

  <script>
    const ROW_COUNT = 25;
    const tbody = document.getElementById('tbody');
    const playerRatingEl = document.getElementById('playerRating');
    const totalPointsEl = document.getElementById('totalPoints');
    const newRatingEl = document.getElementById('newRating');
    const matchCountEl = document.getElementById('matchCount');
    const footerTotalEl = document.getElementById('footerTotal');
    const matchDateEl = document.getElementById('matchDate');

    if (!matchDateEl.value) {
      const today = new Date();
      const pad = n => String(n).padStart(2, '0');
      matchDateEl.value = `${today.getFullYear()}-${pad(today.getMonth() + 1)}-${pad(today.getDate())}`;
    }

    function pointage(vCoteJoueur, vCoteAdversaire, vResultat, vTournoi = 2) {
      let vDifference;
      let vAjust;
      let vIndex;
      let vTableauPointages;
      let vPointages;
      let vIndexTournoi;
      let vVictoireFav;

      if (Number(vCoteAdversaire) > Number(vCoteJoueur)) {
        vAjust = 0;
      } else {
        vAjust = 1;
      }

      vDifference = Math.abs(Number(vCoteAdversaire) - Number(vCoteJoueur) - vAjust);

      if (!vTournoi || Number(vTournoi) === 0) {
        vTournoi = 2;
      }

      vIndexTournoi = ((Number(vTournoi) - 1) * 4) + 2;

      const resultat = String(vResultat || '').trim().toUpperCase();

      if (Number(vCoteAdversaire) > Number(vCoteJoueur)) {
        if (resultat === 'V') {
          vVictoireFav = 2;
        } else {
          vVictoireFav = 1;
        }
      } else {
        if (resultat === 'V') {
          vVictoireFav = 0;
        } else {
          vVictoireFav = 3;
        }
      }

      vIndex = vVictoireFav + vIndexTournoi - 1;

      if (vDifference >= 401) {
        vTableauPointages = '401,1,0,22,-20,2,0,33,-31';
      } else if (vDifference >= 301) {
        vTableauPointages = '301,2,-1,20,-18,3,-1,30,-28';
      } else if (vDifference >= 201) {
        vTableauPointages = '201,3,-2,18,-16,5,-3,27,-25';
      } else if (vDifference >= 151) {
        vTableauPointages = '151,4,-3,16,-14,6,-4,24,-22';
      } else if (vDifference >= 101) {
        vTableauPointages = '101,5,-4,14,-12,8,-6,21,-19';
      } else if (vDifference >= 51) {
        vTableauPointages = '51,6,-5,12,-10,9,-7,18,-16';
      } else if (vDifference >= 26) {
        vTableauPointages = '26,7,-6,10,-8,11,-9,15,-13';
      } else {
        vTableauPointages = '0,8,-6,8,-6,12,-10,12,-10';
      }

      vPointages = vTableauPointages.split(',');
      return Number(vPointages[vIndex]);
    }

    function buildRows() {
      let html = '';
      for (let i = 1; i <= ROW_COUNT; i++) {
        html += `
          <tr>
            <td class="center">${i}</td>
            <td><input type="text" class="opp-name" data-row="${i}" placeholder="Adversaire ${i}" /></td>
            <td><input type="number" class="opp-rating" data-row="${i}" step="1" placeholder="0" /></td>
            <td>
              <select class="opp-result" data-row="${i}">
                <option value=""></option>
                <option value="V">V</option>
                <option value="D">D</option>
              </select>
            </td>
            <td class="points-cell" id="points-${i}"></td>
          </tr>`;
      }
      tbody.innerHTML = html;
    }

    function recalc() {
      const playerRating = Number(playerRatingEl.value || 0);
      let total = 0;
      let matches = 0;

      for (let i = 1; i <= ROW_COUNT; i++) {
        const name = document.querySelector(`.opp-name[data-row="${i}"]`).value.trim();
        const ratingRaw = document.querySelector(`.opp-rating[data-row="${i}"]`).value;
        const result = document.querySelector(`.opp-result[data-row="${i}"]`).value.trim().toUpperCase();
        const cell = document.getElementById(`points-${i}`);

        cell.textContent = '';
        cell.classList.remove('positive', 'negative');

        if (name !== '' || ratingRaw !== '' || result !== '') {
          if (ratingRaw !== '' && (result === 'V' || result === 'D')) {
            const points = pointage(playerRating, Number(ratingRaw), result, 2);
            cell.textContent = points;
            if (points > 0) cell.classList.add('positive');
            if (points < 0) cell.classList.add('negative');
            total += points;
            matches += 1;
          } else {
            cell.textContent = '...';
          }
        }
      }

      totalPointsEl.textContent = total;
      footerTotalEl.textContent = total;
      newRatingEl.textContent = playerRating + total;
      matchCountEl.textContent = matches;
    }

    function clearRows() {
      document.getElementById('competition').value = '';
      document.getElementById('matchDate').value = '';
      document.getElementById('playerName').value = '';
      playerRatingEl.value = '';
      document.querySelectorAll('.opp-name').forEach(el => el.value = '');
      document.querySelectorAll('.opp-rating').forEach(el => el.value = '');
      document.querySelectorAll('.opp-result').forEach(el => el.value = '');
      recalc();
    }

    function loadExample() {
      clearRows();
      document.getElementById('playerName').value = 'William';
      playerRatingEl.value = 664;

      const example = [
        { name: 'Exemple 1', rating: 757, result: 'D' },
        { name: 'Exemple 2', rating: 802, result: 'V' },
        { name: 'Exemple 3', rating: 598, result: 'D' },
        { name: 'Exemple 4', rating: 535, result: 'V' }
      ];

      example.forEach((row, idx) => {
        const i = idx + 1;
        document.querySelector(`.opp-name[data-row="${i}"]`).value = row.name;
        document.querySelector(`.opp-rating[data-row="${i}"]`).value = row.rating;
        document.querySelector(`.opp-result[data-row="${i}"]`).value = row.result;
      });

      recalc();
    }

    buildRows();
    document.addEventListener('input', event => {
      if (event.target.matches('input, select')) recalc();
    });
    document.addEventListener('change', event => {
      if (event.target.matches('input, select')) recalc();
    });
    document.getElementById('btnClear').addEventListener('click', clearRows);
    document.getElementById('btnExample').addEventListener('click', loadExample);

    loadExample();
  </script>
</body>
</html>
